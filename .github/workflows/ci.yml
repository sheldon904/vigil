name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # verify runs unit tests (surefire) and the Testcontainers integration
      # tests (failsafe); the runner's Docker daemon hosts the containers
      - name: Build and test
        run: ./mvnw -ntp verify
